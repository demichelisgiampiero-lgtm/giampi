<svg xmlns="http://www.w3.org/2000/svg" width="820" height="620" viewBox="0 0 820 620" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="820" height="620" fill="#1e1e22"/>
  <text x="410" y="40" fill="#9aa0a6" font-size="18" text-anchor="middle">Obsidian · Graph view — second brain di Giampiero</text>

  <!-- EDGES (wikilink) -->
  <g stroke="#4b4b55" stroke-width="1.6">
    <!-- index hub -->
    <line x1="410" y1="320" x2="250" y2="170"/>
    <line x1="410" y1="320" x2="580" y2="160"/>
    <line x1="410" y1="320" x2="680" y2="350"/>
    <line x1="410" y1="320" x2="430" y2="540"/>
    <line x1="410" y1="320" x2="150" y2="410"/>
    <!-- karpathy links -->
    <line x1="430" y1="540" x2="250" y2="170"/>
    <line x1="430" y1="540" x2="580" y2="160"/>
    <line x1="430" y1="540" x2="680" y2="350"/>
    <line x1="430" y1="540" x2="150" y2="410"/>
    <!-- journal cross-links -->
    <line x1="680" y1="350" x2="250" y2="170"/>
    <line x1="680" y1="350" x2="580" y2="160"/>
  </g>

  <!-- NODES -->
  <!-- index (hub) -->
  <circle cx="410" cy="320" r="24" fill="#b39dff"/>
  <text x="410" y="362" fill="#e8e6f0" font-size="15" font-weight="600" text-anchor="middle">index</text>

  <!-- karpathy-second-brain (idea, hub) -->
  <circle cx="430" cy="540" r="22" fill="#7ec8a0"/>
  <text x="430" y="578" fill="#cfeede" font-size="13" text-anchor="middle">karpathy-second-brain</text>

  <!-- 2026-05-31 (diario) -->
  <circle cx="680" cy="350" r="19" fill="#ffd27d"/>
  <text x="680" y="384" fill="#f4e4bf" font-size="13" text-anchor="middle">2026-05-31</text>

  <!-- profile -->
  <circle cx="250" cy="170" r="17" fill="#7fb5ff"/>
  <text x="250" y="146" fill="#cfe2ff" font-size="13" text-anchor="middle">profile</text>

  <!-- decisions -->
  <circle cx="580" cy="160" r="17" fill="#ff9d8a"/>
  <text x="580" y="136" fill="#ffd7cf" font-size="13" text-anchor="middle">decisions</text>

  <!-- guida-obsidian -->
  <circle cx="150" cy="410" r="14" fill="#c9c9d4"/>
  <text x="150" y="440" fill="#e0e0e8" font-size="13" text-anchor="middle">guida-obsidian</text>

  <!-- legend -->
  <g font-size="12">
    <circle cx="40" cy="560" r="7" fill="#b39dff"/><text x="54" y="564" fill="#9aa0a6">indice / MOC</text>
    <circle cx="160" cy="560" r="7" fill="#7ec8a0"/><text x="174" y="564" fill="#9aa0a6">idea</text>
    <circle cx="240" cy="560" r="7" fill="#ffd27d"/><text x="254" y="564" fill="#9aa0a6">diario</text>
    <circle cx="330" cy="560" r="7" fill="#7fb5ff"/><text x="344" y="564" fill="#9aa0a6">profilo</text>
    <circle cx="430" cy="560" r="7" fill="#ff9d8a"/><text x="444" y="564" fill="#9aa0a6">decisione</text>
  </g>
</svg>
